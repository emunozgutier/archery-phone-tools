<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archery Phone Tools</title>
    <!-- Favicon loader -->
    <link id="favicon" rel="icon" type="image/svg+xml" href="" />
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .loader-container {
        text-align: center;
        padding: 2.5rem 2rem;
        border-radius: 1.25rem;
        background: rgba(30, 41, 59, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
        max-width: 420px;
        width: 90%;
      }
      .spinner {
        display: inline-block;
        width: 3.5rem;
        height: 3.5rem;
        border: 3.5px solid rgba(255, 255, 255, 0.08);
        border-radius: 50%;
        border-top-color: #38bdf8;
        animation: spin 0.8s linear infinite;
        margin-bottom: 1.75rem;
        box-shadow: 0 0 15px rgba(56, 189, 248, 0.15);
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      h2 {
        margin: 0 0 0.5rem 0;
        font-size: 1.35rem;
        font-weight: 700;
        letter-spacing: -0.025em;
        background: linear-gradient(to right, #f8fafc, #cbd5e1);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      p {
        margin: 0;
        color: #94a3b8;
        font-size: 0.9rem;
        line-height: 1.5;
      }
      .error-container {
        display: none;
      }
      .error-container h2 {
        background: linear-gradient(to right, #f87171, #ef4444);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .error-container button {
        margin-top: 1.5rem;
        background-color: #38bdf8;
        color: #0f172a;
        border: none;
        padding: 0.625rem 1.25rem;
        border-radius: 0.5rem;
        font-weight: 600;
        font-size: 0.875rem;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 6px -1px rgba(56, 189, 248, 0.2);
      }
      .error-container button:hover {
        background-color: #7dd3fc;
        transform: translateY(-1px);
        box-shadow: 0 6px 8px -1px rgba(56, 189, 248, 0.3);
      }
      .error-container button:active {
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <div id="loader" class="loader-container">
      <div class="spinner"></div>
      <h2>Archery Phone Tools</h2>
      <p id="loader-text">Loading application...</p>
    </div>

    <div id="error" class="loader-container error-container">
      <h2>Failed to load application</h2>
      <p id="error-text">Unknown error</p>
      <button onclick="window.location.reload()">Try Again</button>
    </div>

    <script type="module">
      const repo = 'emunozgutier/archery-phone-tools';
      const branch = 'main';
      
      // Fetch dist/index.html with cache busting from raw GitHub Content (always serves latest immediately)
      const rawBaseUrl = `https://raw.githubusercontent.com/emunozgutier/archery-phone-tools/main/dist/`;
      const cdnBaseUrl = `https://cdn.jsdelivr.net/gh/${repo}@${branch}/dist/`;

      function showError(msg) {
        document.getElementById('loader').style.display = 'none';
        const errEl = document.getElementById('error');
        errEl.style.display = 'block';
        document.getElementById('error-text').textContent = msg;
      }

      async function loadApp() {
        try {
          const textEl = document.getElementById('loader-text');
          
          textEl.textContent = 'Checking for updates...';
          const htmlRes = await fetch(`${rawBaseUrl}index.html?t=${Date.now()}`, { cache: 'no-store' });
          if (!htmlRes.ok) throw new Error(`Could not reach the latest release (${htmlRes.status}).`);
          
          const htmlText = await htmlRes.text();
          
          textEl.textContent = 'Booting app environment...';
          const parser = new DOMParser();
          const doc = parser.parseFromString(htmlText, 'text/html');
          
          // 1. Title Sync
          document.title = doc.title || 'Archery Phone Tools';
          
          // 2. Favicon Sync
          const favLink = doc.querySelector('link[rel*="icon"]');
          if (favLink) {
            const favHref = favLink.getAttribute('href');
            document.getElementById('favicon').href = favHref.startsWith('http') ? favHref : cdnBaseUrl + favHref.replace(/^\.?\//, '');
          }

          // 3. Inject Compiled CSS Stylesheets
          const links = doc.querySelectorAll('link[rel="stylesheet"]');
          for (const link of links) {
            const href = link.getAttribute('href');
            if (href) {
              const newLink = document.createElement('link');
              newLink.rel = 'stylesheet';
              newLink.href = href.startsWith('http') ? href : cdnBaseUrl + href.replace(/^\.?\//, '');
              document.head.appendChild(newLink);
            }
          }

          // 4. Inject head meta/other elements (excluding scripts and styles)
          const otherHeadElements = doc.querySelectorAll('head > *:not(script):not(link[rel="stylesheet"]):not(title):not(link[rel*="icon"])');
          otherHeadElements.forEach(el => document.head.appendChild(el.cloneNode(true)));

          // 5. Clean up Loader Layout
          const loader = document.getElementById('loader');
          if (loader) loader.remove();
          const errorContainer = document.getElementById('error');
          if (errorContainer) errorContainer.remove();

          // 6. Copy Body Nodes
          document.body.innerHTML = doc.body.innerHTML;

          // 7. Inject and Execute JS Scripts
          const scripts = doc.querySelectorAll('script');
          for (const script of scripts) {
            const src = script.getAttribute('src');
            const newScript = document.createElement('script');
            
            // Copy all existing attributes
            Array.from(script.attributes).forEach(attr => {
              if (attr.name !== 'src') {
                newScript.setAttribute(attr.name, attr.value);
              }
            });
            
            if (src) {
              // Note: since Vite is built with base URL pointing to jsDelivr CDN,
              // src in the fetched index.html will already contain the absolute CDN link!
              // But in case base is relative, we fall back gracefully:
              newScript.src = src.startsWith('http') ? src : cdnBaseUrl + src.replace(/^\.?\//, '');
            } else {
              newScript.textContent = script.textContent;
            }
            document.body.appendChild(newScript);
          }

        } catch (err) {
          console.error(err);
          showError(err.message);
        }
      }

      loadApp();
    </script>
  </body>
</html>
